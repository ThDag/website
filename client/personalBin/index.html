<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PersonalBin</title>
  <link href="../node_modules/bootstrap/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .card-subtle {
      background-color: var(--bs-body-bg);
      border: 1px solid var(--bs-border-color);
    }
  </style>
</head>

<body>

  <div class="container py-5" style="max-width: 640px;">
    <div id="loginStatus" class="small text-secondary mb-3">Not logged in</div>
    <div class="mb-4">
      <h1 class="h3 mb-1">PersonalBin</h1>
      <p class="text-secondary small mb-0">A barebones pastebin with account creation, login, and persistent text storage — built to learn authentication, sessions, and databases.</p>
    </div>

    <div id="messageArea"></div>

    <div class="card-subtle rounded-3 p-4 mb-4">
      <form>
        <div class="mb-3">
          <label for="username" class="form-label small fw-medium">Username</label>
          <input type="text" id="username" name="username" class="form-control" autocomplete="username">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label small fw-medium">Password</label>
          <input type="password" id="password" name="password" class="form-control" autocomplete="current-password">
        </div>
        <div class="d-flex gap-2">
          <button id="loginBtn" class="btn btn-primary" name="logIn">Log in</button>
          <button id="signupBtn" class="btn btn-outline-secondary" name="signUp">Sign up</button>
        </div>
      </form>
    </div>

    <div class="card-subtle rounded-3 p-4">
      <div class="mb-3">
        <label for="mainTextBox" class="form-label small fw-medium">Your box</label>
        <textarea class="form-control font-monospace" id="mainTextBox" rows="8"></textarea>
      </div>
      <button id="submitChangesBtn" class="btn btn-success" name="submitChanges">Submit Changes</button>
    </div>
  </div>

  <script src="../scripts/personalBin.js"></script>
  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  <script src="ui-controller.js"></script>
</body>

</html>
