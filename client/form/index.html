<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css">
  <title>Send a message</title>
</head>

<body>
  <div class="container mt-3">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <h1 class="text-center">Send me a message</h1>
        <p>Send me a message about anything you like. Recommendation about the site? want to contact me? Just want to
          say something? You are free to say anything you like. Please tell me who you are though.</p>

        <form>
          <div class="mb-3">
            <label for="name" class="form-label">name</label>
            <input type="text" id="name" name="name" class="form-control">
          </div>

          <div class="mb-3">
            <label class="form-label" for="teMessage">Message</label>
            <input class="form-control" type="text" name="theMessage" id="theMessage" required>
          </div>

          <button id="mainSubmitButton" class="btn btn-primary">send</button>
        </form>

      </div>
    </div>
  </div>


  <script src="../scripts/form.js"></script>
  <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
